openapi: "3.0.0"
info:
  title: "Azure OpenAI API"
  description: "Secure proxy to Azure OpenAI chat completion models. APIM handles managed-identity auth, rate limiting, and quota enforcement."
  version: "2024-02-01"
servers:
  - url: "https://lw-ai-openai-dev.openai.azure.com/openai"
    description: "Dev (overridden per environment at deploy time)"

paths:
  /deployments/{deployment-id}/chat/completions:
    post:
      operationId: ChatCompletions_Create
      summary: Create a chat completion
      parameters:
        - name: deployment-id
          in: path
          required: true
          description: "Azure OpenAI deployment name (e.g. gpt-4o)"
          schema:
            type: string
        - name: api-version
          in: query
          required: true
          description: "Azure OpenAI API version (e.g. 2024-02-01)"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - messages
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                max_tokens:
                  type: integer
      responses:
        "200":
          description: Chat completion response
        "429":
          description: Rate limit exceeded
