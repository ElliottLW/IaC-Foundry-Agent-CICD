openapi: "3.0.0"
info:
  title: "AI Foundry Agents API"
  description: |
    Single-turn agent invocation via the Azure AI Foundry Responses protocol.
    APIM handles authentication (managed identity → ai.azure.com), injects the
    api-version and Foundry-Features headers, enforces rate limits, and emits
    traces to Application Insights.
  version: "v1"
servers:
  - url: "https://apim-lw-ai-dev.azure-api.net/agents"
    description: "Dev APIM gateway (service URL overridden per environment at deploy time)"

paths:
  /{agentName}/endpoint/protocols/openai/responses:
    post:
      operationId: InvokeAgentResponse
      summary: Invoke an agent and receive a synchronous response
      description: |
        Sends an input to the named Foundry prompt agent and returns a
        completed Responses-protocol object. APIM automatically injects:
          • api-version: 2025-05-15-preview
          • Foundry-Features: AgentEndpoints=V1Preview
          • Authorization: Bearer <managed-identity token for ai.azure.com>
      parameters:
        - name: agentName
          in: path
          required: true
          schema:
            type: string
          description: Foundry agent name (e.g. azure-ai-portugal-agent-dev)
          example: azure-ai-portugal-agent-dev
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - input
              properties:
                input:
                  type: string
                  description: User message / prompt to send to the agent
                  example: "What is the capital of Portugal?"
                previous_response_id:
                  type: string
                  description: |
                    ID of a previous response — enables multi-turn conversation
                    without managing thread state client-side.
            example:
              input: "What is the capital of Portugal?"
      responses:
        "200":
          description: Completed agent response (Foundry Responses object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Unique response ID
                    example: resp_07558193b2210ad2006a02f5553fdc8197b78900cda05e332c
                  status:
                    type: string
                    enum: [completed, in_progress, failed]
                  agent:
                    type: object
                    properties:
                      name:
                        type: string
                        example: azure-ai-portugal-agent-dev
                      version:
                        type: string
                        example: "12"
                  output:
                    type: array
                    items:
                      type: object
        "400":
          description: Bad request (e.g. missing `input` field)
        "401":
          description: Unauthorized
        "429":
          description: Rate limit exceeded — check Retry-After header
        "500":
          description: Internal server error
