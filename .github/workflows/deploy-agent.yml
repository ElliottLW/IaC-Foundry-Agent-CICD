name: Deploy Agent

# Deploys one or all agents to a chosen environment.
# Trigger manually via Actions → Deploy Agent → Run workflow.
# For a full dev → test → prod promotion, use the Promote Agent workflow instead.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      agent:
        description: "Agent to deploy (leave blank to deploy all)"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Deploy the agent inside the correct GitHub Environment ────────────────
  # FOUNDRY_PROJECT_ENDPOINT and OPENAI_DEPLOYMENT_NAME must be set as
  # GitHub Environment variables for each environment (dev / test / prod).
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: src/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r src/scripts/requirements.txt

      - name: Deploy agent(s)
        id: deploy
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          OPENAI_DEPLOYMENT_NAME:   ${{ vars.OPENAI_DEPLOYMENT_NAME }}
          AGENT_INPUT:              ${{ inputs.agent }}
        run: |
          if [ -n "$AGENT_INPUT" ]; then
            echo "Deploying single agent: $AGENT_INPUT"
            python src/scripts/deploy-agent.py --env "${{ inputs.environment }}" --agent "$AGENT_INPUT"
          else
            echo "Deploying all agents in src/agents/"
            for agent_dir in src/agents/*/; do
              agent=$(basename "$agent_dir")
              echo "→ Deploying $agent"
              python src/scripts/deploy-agent.py --env "${{ inputs.environment }}" --agent "$agent"
            done
          fi

      - name: Summary
        env:
          INVOKE_URL: ${{ steps.deploy.outputs.invoke_url }}
        run: |
          echo "### Agent Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent | \`${AGENT_INPUT:-all}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$INVOKE_URL" ]; then
            echo "| Invoke URL | \`$INVOKE_URL\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
