name: Deploy APIM Policies

on:
  push:
    branches: [main, test, dev]
    paths:
      - "src/apim-policies/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  # ── Resolve environment from branch or manual input ───────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve target environment
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            case "${{ github.ref_name }}" in
              main) ENV="prod" ;;
              test) ENV="test" ;;
              dev)  ENV="dev"  ;;
              *)    echo "Unknown branch — cannot resolve environment"; exit 1 ;;
            esac
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "Deploying APIM policies to: $ENV"

  # ── Push policy XML files to APIM ─────────────────────────────────────────
  # APIM_NAME and RESOURCE_GROUP_NAME must be set as GitHub Environment
  # variables for each environment (dev / test / prod).
  deploy:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate required environment variables
        run: |
          : "${APIM_NAME:?GitHub Environment variable APIM_NAME is not set}"
          : "${RESOURCE_GROUP_NAME:?GitHub Environment variable RESOURCE_GROUP_NAME is not set}"
        env:
          APIM_NAME:           ${{ vars.APIM_NAME }}
          RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}

      - name: Deploy chat API policy
        env:
          APIM_NAME:           ${{ vars.APIM_NAME }}
          RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
          ENVIRONMENT:         ${{ needs.setup.outputs.environment }}
        run: |
          echo "Pushing chat-api.xml ($ENVIRONMENT) → $APIM_NAME ($RESOURCE_GROUP_NAME)"
          az apim api policy create \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --service-name   "$APIM_NAME" \
            --api-id         "foundry-chat-models" \
            --value          "$(cat src/apim-policies/$ENVIRONMENT/chat-api.xml)" \
            --policy-format  xml
          echo "✅ chat-api policy deployed"

      - name: Deploy agents API policy
        env:
          APIM_NAME:           ${{ vars.APIM_NAME }}
          RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
          ENVIRONMENT:         ${{ needs.setup.outputs.environment }}
        run: |
          echo "Pushing agents-api.xml ($ENVIRONMENT) → $APIM_NAME ($RESOURCE_GROUP_NAME)"
          az apim api policy create \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --service-name   "$APIM_NAME" \
            --api-id         "foundry-agents" \
            --value          "$(cat src/apim-policies/$ENVIRONMENT/agents-api.xml)" \
            --policy-format  xml
          echo "✅ agents-api policy deployed"

      - name: Summary
        env:
          APIM_NAME:   ${{ vars.APIM_NAME }}
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
        run: |
          echo "### APIM Policy Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| API | Policy file | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| foundry-chat-models | chat-api.xml | ✅ deployed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| foundry-agents | agents-api.xml | ✅ deployed |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**APIM instance**: \`$APIM_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment**: \`$ENVIRONMENT\`" >> "$GITHUB_STEP_SUMMARY"
